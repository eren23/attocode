# code-intel-bench: impact_analysis tasks
# Category: impact_analysis — can the tool compute blast radius for changes?
# Tools: impact_analysis

tasks:
  - task_id: "impact_analysis-fastapi-001"
    category: "impact_analysis"
    repo: "fastapi"
    query: "If I change the APIRouter class, what is the blast radius? What files and modules would be affected?"
    tools_required: [impact_analysis]
    difficulty: medium
    target_symbol: "APIRouter"
    target_file: "fastapi/routing.py"
    search_query: ""
    ground_truth:
      must_contain: ["APIRouter", "routing"]
      must_mention_files: ["fastapi/routing.py", "fastapi/applications.py"]
    scoring_rubric:
      deterministic_weight: 0.7

