# Original pre-optimization defaults (snapshot of the very first state before any meta-harness work)
# Used for "BEFORE" comparison in 20-repo experiment.

# BM25
bm25_k1: 1.5
bm25_b: 0.75

# Symbol name match boosts
name_exact_boost: 3.0
name_substring_boost: 2.0
name_token_boost: 1.5

# Definition-type boosts
class_boost: 1.3
function_boost: 1.15
method_boost: 1.1

# Path relevance
src_dir_boost: 1.2

# Multi-term coverage
multi_term_high_bonus: 1.4
multi_term_med_bonus: 1.15
multi_term_high_threshold: 0.8
multi_term_med_threshold: 0.5

# File type penalties
non_code_penalty: 0.3
config_penalty: 0.15
test_penalty: 0.7

# Exact phrase
exact_phrase_bonus: 1.2

# Dedup
max_chunks_per_file: 2

# Two-stage retrieval
wide_k_multiplier: 5
wide_k_min: 50
rrf_k: 60

# Algorithmic signals — ALL OFF (didn't exist in original)
importance_weight: 0.0
frecency_weight: 0.0
rerank_confidence_threshold: 0.0
dep_proximity_weight: 0.0
dep_proximity_seed_count: 5

# Adaptive fusion — OFF
adaptive_fusion: false
kw_dominance_threshold: 1.5
rrf_k_keyword_high_conf: 10
rrf_k_vector_low_conf: 250
