name: CI

on:
  # push:
  #   branches: [main, master]
  # pull_request:
  #   branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --locked --extra dev --extra code-intel

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Type check
        run: uv run mypy src/attocode src/attoswarm src/attocode_core --ignore-missing-imports

      - name: Run tests
        run: uv run pytest tests/unit/ -q --tb=short --cov=src/attocode --cov=src/attoswarm --cov=src/attocode_core --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  install-sanity:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Verify all extras resolve
        run: uv sync --locked --all-extras

  pack-license-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install dependencies (PyYAML for the script)
        run: uv sync --locked --extra dev

      - name: Verify community pack licenses
        run: uv run python scripts/check_pack_licenses.py

  research-integration:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --locked --extra dev --extra code-intel

      - name: Run research integration tests
        run: uv run pytest tests/integration/test_research_cli.py tests/integration/test_research_orchestrator_real.py tests/integration/test_research_failure_modes.py -q -m "integration and not live_swarm and not slow"
