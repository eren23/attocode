name: Benchmark

on:
  # push:
  #   branches: [main, master]
  # pull_request:
  #   branches: [main, master]
  schedule:
    # Weekly on Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --locked --all-extras

      - name: Run benchmarks
        run: |
          uv run python scripts/benchmark_ci.py \
            --repos attocode \
            --num-runs 3 \
            --no-fail-on-regression \
            --output-json benchmark_results.json \
            --output-comment benchmark_comment.md
        env:
          BENCHMARK_REPOS_DIR: ~/benchmark-repos

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const comment = fs.readFileSync('benchmark_comment.md', 'utf8');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Benchmark Results')
            );
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comment,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment,
              });
            }

      - name: Update baseline on main merge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          uv run python scripts/benchmark_ci.py \
            --repos attocode \
            --num-runs 3 \
            --update-baseline
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add eval/benchmark_baseline.json
          git diff --cached --quiet || git commit -m "chore: update benchmark baseline [skip ci]"
          git push

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            benchmark_results.json
            benchmark_comment.md

      - name: Check for regressions
        if: github.event_name == 'pull_request'
        run: |
          uv run python - <<'PY'
          import json
          import sys

          with open("benchmark_results.json") as f:
              data = json.load(f)

          regressions = [r for r in data.get("regressions", []) if r.get("is_regression")]
          if regressions:
              print("FAIL: Regressions detected:")
              for r in regressions:
                  print(f"  - {r.get('repo')}/{r.get('metric')}: delta={r.get('delta_pct')}")
              sys.exit(1)

          print("PASS: No regressions detected.")
          PY
