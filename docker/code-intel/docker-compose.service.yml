version: "3.8"

services:
  api:
    build:
      context: ../..
      dockerfile: docker/code-intel/Dockerfile
    image: attocode-code-intel:local
    ports:
      - "${ATTOCODE_PORT:-8080}:8080"
    environment:
      - ATTOCODE_HOST=0.0.0.0
      - ATTOCODE_PORT=8080
      - ATTOCODE_API_KEY=${ATTOCODE_API_KEY:-}
      - DATABASE_URL=postgresql+asyncpg://codeintel:codeintel@postgres:5432/codeintel
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - GIT_CLONE_DIR=/var/lib/code-intel/repos
      - GIT_CLONE_MAX_GB=${GIT_CLONE_MAX_GB:-50}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - ATTOCODE_BASE_URL=${ATTOCODE_BASE_URL:-}
      - ATTOCODE_EMBEDDING_MODEL=${ATTOCODE_EMBEDDING_MODEL:-}
      - REGISTRATION_KEY=${REGISTRATION_KEY:-}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - repo-clones:/var/lib/code-intel/repos

  worker:
    image: attocode-code-intel:local
    command: ["python", "-m", "attocode.code_intel.workers.run"]
    environment:
      - DATABASE_URL=postgresql+asyncpg://codeintel:codeintel@postgres:5432/codeintel
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - GIT_CLONE_DIR=/var/lib/code-intel/repos
      - GIT_CLONE_MAX_GB=${GIT_CLONE_MAX_GB:-50}
      - ATTOCODE_EMBEDDING_MODEL=${ATTOCODE_EMBEDDING_MODEL:-}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import redis; r = redis.Redis.from_url('redis://redis:6379/0'); r.ping()"]
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - repo-clones:/var/lib/code-intel/repos

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: codeintel
      POSTGRES_PASSWORD: codeintel
      POSTGRES_DB: codeintel
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codeintel"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
  repo-clones:
