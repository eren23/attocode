name: Release to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  verify-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag/version consistency and PyPI uniqueness
        env:
          GIT_TAG: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re
          import sys
          import tomllib
          import urllib.error
          import urllib.request
          import json

          tag = os.environ["GIT_TAG"]
          if not tag.startswith("v"):
              raise SystemExit(f"Expected v-prefixed tag, got: {tag}")
          tag_version = tag[1:]

          pyproject = pathlib.Path("pyproject.toml")
          project_data = tomllib.loads(pyproject.read_text(encoding="utf-8"))
          project_version = project_data["project"]["version"]

          init_py = pathlib.Path("src/attocode/__init__.py").read_text(encoding="utf-8")
          m = re.search(r'__version__\s*=\s*"([^"]+)"', init_py)
          if not m:
              raise SystemExit("Could not parse __version__ from src/attocode/__init__.py")
          init_version = m.group(1)

          if tag_version != project_version:
              raise SystemExit(
                  f"Tag version {tag_version} != pyproject version {project_version}"
              )
          if tag_version != init_version:
              raise SystemExit(
                  f"Tag version {tag_version} != src/attocode/__init__.py version {init_version}"
              )

          url = "https://pypi.org/pypi/attocode/json"
          try:
              with urllib.request.urlopen(url, timeout=15) as resp:
                  payload = json.loads(resp.read().decode("utf-8"))
          except urllib.error.HTTPError as exc:
              if exc.code == 404:
                  payload = {"releases": {}}
              else:
                  raise

          releases = payload.get("releases", {})
          if tag_version in releases and releases[tag_version]:
              raise SystemExit(
                  f"Version {tag_version} already exists on PyPI for package 'attocode'."
              )

          print(f"Release guard OK for attocode {tag_version}")
          PY

  build:
    needs: verify-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install --upgrade pip hatchling build

      - name: Build package
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
